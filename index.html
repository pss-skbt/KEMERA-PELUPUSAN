<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelupusan Smart AI</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body { font-family: sans-serif; background: #f1f5f9; }
.loader-ring {
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid red;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg);} }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

const App = () => {
  const [image, setImage] = useState(null);
  const [isCameraOpen, setIsCameraOpen] = useState(false);
  const [loading, setLoading] = useState(false);
  const [statusMsg, setStatusMsg] = useState("");
  const [formData, setFormData] = useState({
    tajuk: '', tahun: '', bil: '1', meter: ''
  });

  const SCRIPT_URL = "PASTE_URL_APPS_SCRIPT_KAU";

  const videoRef = useRef(null);
  const canvasRef = useRef(null);

  // ================= CAMERA =================
  const startCamera = async () => {
    setIsCameraOpen(true);
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    videoRef.current.srcObject = stream;
  };

  const takePhoto = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg');

    setImage(dataUrl);
    video.srcObject.getTracks().forEach(t => t.stop());
    setIsCameraOpen(false);

    processAI(dataUrl.split(',')[1]);
  };

  // ================= AI =================
  const processAI = async (base64) => {
    setLoading(true);
    setStatusMsg("AI membaca...");

    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "scan_image",
        imageRaw: base64
      })
    });

    const data = await res.json();

    setFormData(prev => ({
      ...prev,
      tajuk: data.tajuk || "",
      tahun: data.tahun || ""
    }));

    setLoading(false);
  };

  // ================= BARCODE =================
  const startBarcodeScanner = () => {
    const scanner = new Html5Qrcode("reader");

    scanner.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: 250,
        formatsToSupport: [Html5QrcodeSupportedFormats.EAN_13]
      },
      async (isbn) => {
        scanner.stop();
        setLoading(true);
        setStatusMsg("Cari buku...");

        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "scan_isbn",
            isbn: isbn
          })
        });

        const data = await res.json();

        setFormData(prev => ({
          ...prev,
          tajuk: data.tajuk || "",
          tahun: data.tahun || ""
        }));

        setLoading(false);
      }
    );
  };

  // ================= SAVE =================
  const handleSave = async () => {
    const payload = {
      action: "save_data",
      ...formData,
      imageRaw: image.split(',')[1]
    };

    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(payload)
    });

    alert("Berjaya simpan!");
  };

  return (
    <div className="p-4 max-w-md mx-auto">

      <div className="bg-white p-4 rounded-xl shadow">

        {/* CAMERA */}
        {isCameraOpen && <video ref={videoRef} autoPlay className="w-full"/>}
        {image && <img src={image} className="w-full"/>}

        <canvas ref={canvasRef} className="hidden"></canvas>

        <div id="reader" className="mt-3"></div>

        {loading && <p>{statusMsg}</p>}

        {/* BUTTON */}
        <button onClick={startCamera} className="w-full bg-black text-white p-3 mt-2">
          Buka Kamera
        </button>

        <button onClick={takePhoto} className="w-full bg-red-600 text-white p-3 mt-2">
          Ambil Gambar
        </button>

        <button onClick={startBarcodeScanner} className="w-full bg-blue-600 text-white p-3 mt-2">
          Scan Barcode ISBN
        </button>

        {/* FORM */}
        <textarea
          placeholder="Tajuk"
          value={formData.tajuk}
          onChange={e => setFormData({...formData, tajuk: e.target.value})}
          className="w-full border p-2 mt-3"
        />

        <input
          placeholder="Tahun"
          value={formData.tahun}
          onChange={e => setFormData({...formData, tahun: e.target.value})}
          className="w-full border p-2 mt-2"
        />

        <button onClick={handleSave} className="w-full bg-green-600 text-white p-3 mt-3">
          Simpan
        </button>

      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
