<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelupusan Smart AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .loader { border-top-color: #ef4444; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const App = () => {
            const [image, setImage] = useState(null);
            const [isCameraOpen, setIsCameraOpen] = useState(false);
            const [loading, setLoading] = useState(false);
            const [formData, setFormData] = useState({
                tajuk: '', tahun: '', bil: '1', meter: ''
            });

            // GANTIKAN URL INI DENGAN URL WEB APP ANDA YANG TERKINI
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCMoXBN84xUKUqlnBf_cU6DfwKMZYi-fW-7zPN41YqTca7v3kfbbsqgFx8J1WzQJ6Log/exec";
            const SHEET_URL = "https://docs.google.com/spreadsheets/d/1_CX7JDm7xl-YGGpyZpZnPfYBKou_-TRjtDaFOg4fsl/edit";

            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            const startCamera = async () => {
                setIsCameraOpen(true);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment', width: { ideal: 1280 } } 
                    });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (err) {
                    alert("Akses kamera ditolak.");
                    setIsCameraOpen(false);
                }
            };

            const takePhoto = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                // Kecilkan imej untuk kelajuan AI (Max 800px)
                const scale = 800 / video.videoWidth;
                canvas.width = 800;
                canvas.height = video.videoHeight * scale;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                setImage(dataUrl);
                
                // Tutup kamera
                const stream = video.srcObject;
                if (stream) stream.getTracks().forEach(t => t.stop());
                setIsCameraOpen(false);

                // Jalankan AI Scan
                processAI(dataUrl.split(',')[1]);
            };

            const processAI = async (base64) => {
                setLoading(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "scan_image", imageRaw: base64 })
                    });
                    const result = await response.json();
                    setFormData(prev => ({
                        ...prev,
                        tajuk: result.tajuk || prev.tajuk,
                        tahun: result.tahun || prev.tahun
                    }));
                } catch (err) {
                    alert("Ralat AI: Pastikan Apps Script telah di-deploy dengan betul.");
                } finally {
                    setLoading(false);
                }
            };

            const handleSave = async () => {
                if (!formData.tajuk || !image) return alert("Sila ambil gambar dahulu.");
                setLoading(true);
                try {
                    const payload = {
                        ...formData,
                        id: "ID-" + Math.random().toString(36).substr(2, 6).toUpperCase(),
                        tarikh: new Date().toLocaleString('ms-MY'),
                        imageRaw: image.split(',')[1]
                    };
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    alert("Berjaya disimpan!");
                    setFormData({ tajuk: '', tahun: '', bil: '1', meter: '' });
                    setImage(null);
                } catch (e) {
                    alert("Ralat simpan.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4">
                    <div className="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
                        {/* Header */}
                        <div className="p-6 bg-slate-900 text-white flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <i className="fa-solid fa-microchip text-red-500"></i>
                                <span className="font-black uppercase tracking-tighter text-lg">Pelupusan Smart</span>
                            </div>
                            <a href={SHEET_URL} target="_blank" className="opacity-50 hover:opacity-100"><i className="fa-solid fa-file-excel text-xl"></i></a>
                        </div>

                        {/* Viewfinder */}
                        <div className="p-4 space-y-4">
                            <div className="aspect-[4/3] bg-black rounded-3xl overflow-hidden relative border-4 border-gray-50">
                                {isCameraOpen ? (
                                    <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" />
                                ) : image ? (
                                    <img src={image} className="w-full h-full object-cover" />
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-gray-600">
                                        <i className="fa-solid fa-camera text-4xl mb-2 opacity-20"></i>
                                        <p className="text-[10px] font-bold uppercase tracking-widest">Sedia untuk imbasan</p>
                                    </div>
                                )}
                                {loading && (
                                    <div className="absolute inset-0 bg-black/70 flex flex-col items-center justify-center text-white backdrop-blur-sm z-50">
                                        <div className="loader ease-linear rounded-full border-4 border-t-4 border-gray-700 h-12 w-12 mb-4"></div>
                                        <p className="text-[10px] font-black tracking-[0.3em] animate-pulse">PROSES AI...</p>
                                    </div>
                                )}
                            </div>

                            <button onClick={isCameraOpen ? takePhoto : startCamera} className={`w-full py-5 rounded-2xl font-black tracking-widest transition-all active:scale-95 ${isCameraOpen ? 'bg-red-600 text-white' : 'bg-slate-900 text-white'}`}>
                                {isCameraOpen ? 'AMBIL GAMBAR' : 'BUKA KAMERA'}
                            </button>

                            {/* Form */}
                            <div className="space-y-4 pt-2">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-gray-400 uppercase ml-1">Tajuk Rekod (AI)</label>
                                    <textarea className="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold focus:border-red-500 outline-none" rows="3" value={formData.tajuk} onChange={e => setFormData({...formData, tajuk: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-400 uppercase ml-1">Tahun</label>
                                        <input className="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold text-center" value={formData.tahun} onChange={e => setFormData({...formData, tahun: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-400 uppercase ml-1">Bilangan</label>
                                        <input type="number" className="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold text-center" value={formData.bil} onChange={e => setFormData({...formData, bil: e.target.value})} />
                                    </div>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-gray-400 uppercase ml-1">Meter / Ketebalan</label>
                                    <input className="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold" placeholder="cth: 0.05m" value={formData.meter} onChange={e => setFormData({...formData, meter: e.target.value})} />
                                </div>
                                <button onClick={handleSave} disabled={loading || !image} className={`w-full py-5 rounded-2xl font-black tracking-widest shadow-lg transition-all ${loading || !image ? 'bg-gray-200 text-gray-400' : 'bg-green-600 text-white'}`}>
                                    SIMPAN REKOD
                                </button>
                            </div>
                        </div>
                    </div>
                    <canvas ref={canvasRef} className="hidden"></canvas>
                    <p className="mt-8 text-[10px] font-bold text-gray-300 uppercase tracking-[0.5em]">Kamera Pelupusan Rekod AI</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
