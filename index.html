<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelupusan Smart AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f1f5f9;
        }
        .loader-ring {
            border: 4px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top: 4px solid #ef4444;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            const [image, setImage] = useState(null);
            const [isCameraOpen, setIsCameraOpen] = useState(false);
            const [loading, setLoading] = useState(false);
            const [statusMsg, setStatusMsg] = useState("");
            const [formData, setFormData] = useState({
                tajuk: '', tahun: '', bil: '1', meter: ''
            });

            // SCRIPT_URL deployment terkini
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxnRxOdSHwHbyCothHHzghCaUDln5EI9tlH9KIMrxxMitYl8eS8MzYclq273NErYyvLXg/exec";
            const SHEET_URL = "https://docs.google.com/spreadsheets/d/1_CX7JDm7xl-YGGpyZpZnPfYBKou_-TRjtDaFOg4fsl/edit";

            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            const startCamera = async () => {
                setIsCameraOpen(true);
                setImage(null);
                setStatusMsg("");
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            facingMode: 'environment', 
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        } 
                    });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (err) {
                    alert("Akses kamera ditolak atau tidak tersedia.");
                    setIsCameraOpen(false);
                }
            };

            const takePhoto = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                if (!video) return;

                const targetWidth = 1080;
                const scale = targetWidth / video.videoWidth;
                canvas.width = targetWidth;
                canvas.height = video.videoHeight * scale;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                setImage(dataUrl);
                
                const stream = video.srcObject;
                if (stream) stream.getTracks().forEach(t => t.stop());
                setIsCameraOpen(false);

                processAI(dataUrl.split(',')[1]);
            };

            const processAI = async (base64) => {
                setLoading(true);
                setStatusMsg("AI Membaca Teks Buku...");
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "scan_image", imageRaw: base64 })
                    });
                    
                    if (!response.ok) throw new Error("Gagal menghubungi server.");
                    
                    const result = await response.json();
                    
                    if (result.tajuk || result.tahun) {
                        setFormData(prev => ({
                            ...prev,
                            tajuk: result.tajuk || prev.tajuk,
                            tahun: result.tahun || prev.tahun
                        }));
                        setStatusMsg("Imbasan Selesai!");
                    } else {
                        setStatusMsg("AI Gagal mengesan teks pada buku.");
                    }
                } catch (err) {
                    console.error(err);
                    setStatusMsg("Gagal Menghubungi AI.");
                } finally {
                    setLoading(false);
                }
            };

            const handleSave = async () => {
                if (!formData.tajuk || !image) return alert("Sila ambil gambar dan pastikan tajuk diisi.");
                
                setLoading(true);
                setStatusMsg("Menyimpan Rekod...");
                try {
                    const payload = {
                        action: "save_data",
                        ...formData,
                        id: "PLP-" + Math.random().toString(36).substr(2, 6).toUpperCase(),
                        tarikh: new Date().toLocaleString('ms-MY'),
                        imageRaw: image.split(',')[1]
                    };
                    
                    await fetch(SCRIPT_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify(payload) 
                    });
                    
                    alert("Rekod Berjaya Disimpan ke Google Sheets!");
                    setFormData({ tajuk: '', tahun: '', bil: '1', meter: '' });
                    setImage(null);
                    setStatusMsg("");
                } catch (e) {
                    alert("Ralat semasa menyimpan.");
                    setStatusMsg("Gagal Menyimpan.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 pb-12">
                    <div className="w-full max-w-md glass-card rounded-[2.5rem] shadow-2xl overflow-hidden border border-white">
                        <div className="p-6 bg-slate-900 text-white flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-red-500 p-2 rounded-xl shadow-lg shadow-red-500/30">
                                    <i className="fa-solid fa-book-open text-lg"></i>
                                </div>
                                <div>
                                    <h1 className="font-extrabold uppercase tracking-tight leading-none text-lg">Pelupusan</h1>
                                    <p className="text-[10px] text-red-400 font-bold tracking-widest uppercase">OCR Buku & Fail</p>
                                </div>
                            </div>
                            <a href={SHEET_URL} target="_blank" className="bg-white/10 p-2 rounded-full hover:bg-white/20 transition-all">
                                <i className="fa-solid fa-file-excel text-green-400"></i>
                            </a>
                        </div>

                        <div className="p-5 space-y-5">
                            <div className="aspect-[4/3] bg-slate-200 rounded-[2rem] overflow-hidden relative border-4 border-white shadow-inner">
                                {isCameraOpen ? (
                                    <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" />
                                ) : image ? (
                                    <img src={image} className="w-full h-full object-cover shadow-lg" />
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-400 bg-slate-100">
                                        <i className="fa-solid fa-camera text-5xl mb-4 opacity-20"></i>
                                        <p className="text-[11px] font-black uppercase tracking-[0.2em]">Sedia Untuk Scan Teks</p>
                                    </div>
                                )}
                                
                                {loading && (
                                    <div className="absolute inset-0 bg-slate-900/80 flex flex-col items-center justify-center text-white backdrop-blur-md z-50 transition-all">
                                        <div className="loader-ring mb-4"></div>
                                        <p className="text-[11px] font-black tracking-[0.3em] uppercase animate-pulse">
                                            {statusMsg || "MEMBACA TEKS..."}
                                        </p>
                                    </div>
                                )}
                            </div>

                            <button 
                                onClick={isCameraOpen ? takePhoto : startCamera} 
                                className={`w-full py-6 rounded-2xl font-black tracking-widest transition-all active:scale-95 shadow-xl flex items-center justify-center gap-3 ${isCameraOpen ? 'bg-red-600 text-white shadow-red-500/20' : 'bg-slate-900 text-white'}`}
                            >
                                <i className={`fa-solid ${isCameraOpen ? 'fa-camera' : 'fa-power-off'}`}></i>
                                {isCameraOpen ? 'AMBIL GAMBAR & SCAN' : 'BUKA KAMERA'}
                            </button>

                            <div className="space-y-5 pt-2">
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tajuk Buku/Fail (Hasil Scan)</label>
                                    <textarea 
                                        className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold focus:border-red-500 outline-none transition-all shadow-inner min-h-[100px]" 
                                        placeholder="Teks yang dikesan pada buku akan dipaparkan di sini..."
                                        value={formData.tajuk} 
                                        onChange={e => setFormData({...formData, tajuk: e.target.value})} 
                                    />
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tahun Terbitan</label>
                                        <input 
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-center shadow-inner" 
                                            value={formData.tahun} 
                                            placeholder="cth: 1995"
                                            onChange={e => setFormData({...formData, tahun: e.target.value})} 
                                        />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Bilangan Naskhah</label>
                                        <input 
                                            type="number" 
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-center shadow-inner" 
                                            value={formData.bil} 
                                            onChange={e => setFormData({...formData, bil: e.target.value})} 
                                        />
                                    </div>
                                </div>

                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Ketebalan (Meter)</label>
                                    <input 
                                        className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold shadow-inner" 
                                        placeholder="cth: 0.05" 
                                        value={formData.meter} 
                                        onChange={e => setFormData({...formData, meter: e.target.value})} 
                                    />
                                </div>

                                <button 
                                    onClick={handleSave} 
                                    disabled={loading || !image} 
                                    className={`w-full py-6 rounded-[2rem] font-black tracking-[0.2em] shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 ${loading || !image ? 'bg-slate-200 text-slate-400' : 'bg-green-600 text-white hover:bg-green-700 shadow-green-500/20'}`}
                                >
                                    <i className="fa-solid fa-cloud-arrow-up"></i>
                                    SIMPAN KE SHEET
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <canvas ref={canvasRef} className="hidden"></canvas>
                    <div className="mt-8 text-center">
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em]">Sistem Pelupusan Pintar v2.4</p>
                        <p className="text-[9px] text-slate-300 mt-1 uppercase tracking-widest">Diperkasakan oleh Gemini AI OCR</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
