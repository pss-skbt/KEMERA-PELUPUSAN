<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera Pelupusan AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loader { border-top-color: #ef4444; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .camera-container { position: relative; overflow: hidden; border-radius: 1.5rem; }
        video { transform: scaleX(1); } /* Tukar ke -1 jika mahu kesan cermin */
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const App = () => {
            const [image, setImage] = useState(null);
            const [isCameraOpen, setIsCameraOpen] = useState(false);
            const [loading, setLoading] = useState(false);
            const [formData, setFormData] = useState({
                tajuk: '',
                tahun: '',
                bil: '1',
                meter: ''
            });

            // KONFIGURASI URL (Pastikan URL SCRIPT_URL adalah yang terkini daripada Deploy Apps Script)
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo9DPDaeVAK2tNBBROFFmnvUzdBEfritcofvmoLSPw-iBWrwgl7v6BY1p4H0gIYwMnlg/exec";
            const SHEET_URL = "https://docs.google.com/spreadsheets/d/1_CX7JDm7xl-YGGpyZpZnPfYBKou_-TRjtDaFOg4fsl/edit";
            const DRIVE_FOLDER_URL = "https://drive.google.com/drive/folders/18zV8uClYgd-0eZlja9ul6vkRJq4v0mWh";

            const videoRef = useRef(null);

            const startCamera = async () => {
                setIsCameraOpen(true);
                setImage(null);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' } 
                    });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }
                } catch (err) {
                    alert("Ralat akses kamera: " + err.message);
                    setIsCameraOpen(false);
                }
            };

            const takePhoto = () => {
                const video = videoRef.current;
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const dataUrl = canvas.toDataURL('image/png');
                setImage(dataUrl);
                
                const stream = video.srcObject;
                if (stream) stream.getTracks().forEach(track => track.stop());
                setIsCameraOpen(false);

                // Jalankan imbasan AI secara automatik melalui Apps Script
                scanWithAI(dataUrl.split(',')[1]);
            };

            const scanWithAI = async (base64Data) => {
                setLoading(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: "scan_image",
                            imageRaw: base64Data
                        })
                    });
                    
                    const result = await response.json();
                    
                    setFormData(prev => ({
                        ...prev,
                        tajuk: result.tajuk || prev.tajuk,
                        tahun: result.tahun || prev.tahun
                    }));
                } catch (err) {
                    console.error("Ralat AI Proxy:", err);
                    alert("Gagal menghubungi AI. Sila pastikan Apps Script telah di-deploy dengan betul.");
                } finally {
                    setLoading(false);
                }
            };

            const handleSave = async () => {
                if (!formData.tajuk) return alert("Sila pastikan tajuk telah diisi.");
                if (!image) return alert("Sila ambil gambar terlebih dahulu.");
                
                setLoading(true);
                const uniqueId = "ID-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                const currentDateTime = new Date().toLocaleString('ms-MY');

                try {
                    // Hantar data untuk simpanan ke Spreadsheet & Drive
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Penting untuk mengelakkan ralat CORS pada redirect
                        body: JSON.stringify({
                            id: uniqueId,
                            tarikh: currentDateTime,
                            bil: formData.bil,
                            tajuk: formData.tajuk,
                            tahun: formData.tahun,
                            meter: formData.meter,
                            imageRaw: image.split(',')[1]
                        })
                    });
                    
                    alert("Rekod berjaya disimpan ke Google Sheets & Drive!");
                    // Reset borang
                    setFormData({ tajuk: '', tahun: '', bil: '1', meter: '' });
                    setImage(null);
                } catch (err) {
                    console.error("Ralat simpan:", err);
                    alert("Ralat ketika menyimpan data.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen pb-12 flex flex-col items-center">
                    {/* Header */}
                    <header className="w-full bg-white border-b p-4 flex justify-between items-center sticky top-0 z-30 shadow-sm max-w-md">
                        <div className="flex items-center gap-2">
                            <div className="bg-red-600 p-2 rounded-lg">
                                <i className="fa-solid fa-microchip text-white text-sm"></i>
                            </div>
                            <h1 className="font-black uppercase tracking-tighter text-lg">
                                Pelupusan <span className="text-red-600">Smart</span>
                            </h1>
                        </div>
                        <div className="flex gap-4">
                            <a href={SHEET_URL} target="_blank" className="text-slate-400 hover:text-green-600 transition-colors">
                                <i className="fa-solid fa-file-excel text-xl"></i>
                            </a>
                            <a href={DRIVE_FOLDER_URL} target="_blank" className="text-slate-400 hover:text-blue-600 transition-colors">
                                <i className="fa-solid fa-folder-open text-xl"></i>
                            </a>
                        </div>
                    </header>

                    <main className="w-full max-w-md p-4 space-y-6">
                        {/* Camera/Preview Section */}
                        <div className="bg-white rounded-[2rem] shadow-xl border-4 border-white overflow-hidden relative">
                            <div className="aspect-[3/4] bg-slate-900 flex items-center justify-center relative">
                                {isCameraOpen ? (
                                    <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" />
                                ) : image ? (
                                    <img src={image} className="w-full h-full object-cover" />
                                ) : (
                                    <div className="text-center text-slate-500">
                                        <div className="mb-4 bg-slate-800 w-20 h-20 rounded-full flex items-center justify-center mx-auto">
                                            <i className="fa-solid fa-camera text-3xl text-slate-400"></i>
                                        </div>
                                        <p className="text-[10px] font-black uppercase tracking-widest">Klik butang di bawah untuk mula</p>
                                    </div>
                                )}
                                
                                {loading && (
                                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm flex flex-col items-center justify-center z-10">
                                        <div className="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-14 w-14 mb-4"></div>
                                        <p className="font-black text-[10px] uppercase tracking-[0.3em] text-white animate-pulse">Sedang Memproses AI...</p>
                                    </div>
                                )}
                            </div>

                            <div className="p-5 bg-white">
                                {!isCameraOpen ? (
                                    <button onClick={startCamera} className="w-full bg-slate-900 text-white font-black py-5 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl hover:bg-slate-800">
                                        <i className="fa-solid fa-camera-rotate"></i> BUKA KAMERA
                                    </button>
                                ) : (
                                    <button onClick={takePhoto} className="w-full bg-red-600 text-white font-black py-5 rounded-2xl flex items-center justify-center gap-3 active:scale-95 shadow-xl animate-bounce-short">
                                        <i className="fa-solid fa-circle-dot text-xl"></i> AMBIL & IMBAS
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* Form Section */}
                        <div className="bg-white p-6 rounded-[2rem] border shadow-sm space-y-5">
                            <div className="flex items-center gap-2 mb-2">
                                <span className="bg-blue-100 text-blue-700 text-[10px] font-black px-2 py-1 rounded uppercase">Data Automasasi</span>
                            </div>
                            
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Tajuk (Dikesan AI)</label>
                                <textarea 
                                    value={formData.tajuk} 
                                    onChange={(e) => setFormData({...formData, tajuk: e.target.value})}
                                    rows="3" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-red-500 font-bold text-sm leading-relaxed transition-colors shadow-inner" 
                                    placeholder="Tajuk akan muncul di sini..."
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Tahun</label>
                                    <input 
                                        type="text" 
                                        value={formData.tahun} 
                                        onChange={(e) => setFormData({...formData, tahun: e.target.value})} 
                                        className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-red-500 font-bold text-center shadow-inner" 
                                        placeholder="Tahun"
                                    />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Bilangan</label>
                                    <input 
                                        type="number" 
                                        value={formData.bil} 
                                        onChange={(e) => setFormData({...formData, bil: e.target.value})} 
                                        className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-red-500 font-bold text-center shadow-inner"
                                    />
                                </div>
                            </div>

                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Meter / Ketebalan</label>
                                <input 
                                    type="text" 
                                    value={formData.meter} 
                                    onChange={(e) => setFormData({...formData, meter: e.target.value})} 
                                    className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-red-500 font-bold shadow-inner" 
                                    placeholder="cth: 0.05m"
                                />
                            </div>

                            <button 
                                onClick={handleSave} 
                                disabled={loading || !image}
                                className={`w-full text-white font-black py-5 rounded-2xl shadow-lg uppercase tracking-[0.2em] flex items-center justify-center gap-3 transition-all ${loading || !image ? 'bg-slate-300 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 active:scale-95 shadow-green-100'}`}
                            >
                                <i className="fa-solid fa-cloud-arrow-up"></i> SIMPAN REKOD
                            </button>
                        </div>

                        <p className="text-center text-[10px] font-bold text-slate-300 uppercase tracking-tighter">
                            Sistem Pelupusan Rekod Bersepadu AI
                        </p>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
