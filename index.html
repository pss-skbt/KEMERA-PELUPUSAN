<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera Pelupusan Pintar</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn-primary { transition: all 0.2s ease-in-out; }
        .btn-primary:active { transform: scale(0.95); }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-xl mx-auto py-10 px-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center p-3 bg-blue-600 rounded-2xl shadow-lg mb-4 text-white">
                <i data-lucide="camera" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">KAMERA PELUPUSAN PINTAR</h1>
            <p class="text-slate-500 mt-2 font-medium">Sistem Pengurusan Rekod & Pelupusan Bahan</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/60 overflow-hidden border border-slate-100">
            
            <div class="relative bg-slate-900 aspect-[4/3] flex items-center justify-center">
                <video id="camera-preview" autoplay playsinline class="w-full h-full object-cover"></video>
                <canvas id="capture-canvas" class="hidden"></canvas>
                
                <div id="camera-overlay" class="absolute inset-0 border-4 border-dashed border-green-400/70 m-8 pointer-events-none rounded-lg hidden flex items-center justify-center">
                    <span class="text-green-400 font-bold bg-slate-900/80 px-3 py-1 rounded-md text-sm">LETAK BUKU DI SINI</span>
                </div>
                
                <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                    <i data-lucide="image" class="w-12 h-12 mb-3 opacity-20"></i>
                    <p class="text-sm text-slate-500">Kamera Sedia Untuk Digunakan</p>
                </div>
            </div>

            <div class="p-6">
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button id="btn-start-camera" class="btn-primary flex items-center justify-center space-x-2 bg-slate-900 text-white py-3.5 px-4 rounded-xl font-semibold hover:bg-slate-800 shadow-md">
                        <i data-lucide="video" class="w-5 h-5"></i>
                        <span>Buka Kamera</span>
                    </button>
                    
                    <button id="btn-snap" class="btn-primary flex items-center justify-center space-x-2 bg-blue-600 text-white py-3.5 px-4 rounded-xl font-semibold hover:bg-blue-700 shadow-md shadow-blue-200 hidden">
                        <i data-lucide="aperture" class="w-5 h-5"></i>
                        <span>Ambil Gambar</span>
                    </button>

                    <label for="gambar-input" class="btn-primary cursor-pointer flex items-center justify-center space-x-2 bg-slate-100 text-slate-700 py-3.5 px-4 rounded-xl font-semibold hover:bg-slate-200">
                        <i data-lucide="upload" class="w-5 h-5"></i>
                        <span>Muat Naik</span>
                    </label>
                    <input type="file" id="gambar-input" accept="image/*" class="hidden">
                </div>

                <div id="status-container" class="mb-6 p-4 bg-blue-50 rounded-2xl flex items-center justify-between hidden">
                    <div class="flex items-center space-x-3">
                        <div class="loader" id="loading-spinner"></div>
                        <span id="status-text" class="text-sm font-semibold text-blue-700">Mengecam teks...</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="space-y-2">
                        <label for="input-tajuk" class="flex items-center space-x-2 text-sm font-bold text-slate-700 ml-1">
                            <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i>
                            <span>TAJUK REKOD / BAHAN</span>
                        </label>
                        <input type="text" id="input-tajuk" 
                               placeholder="Tajuk akan diisi secara imbasan..."
                               class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-semibold placeholder:text-slate-400 focus:border-blue-500 focus:ring-0 outline-none transition-all uppercase">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label for="input-tahun" class="flex items-center space-x-2 text-sm font-bold text-slate-700 ml-1">
                                <i data-lucide="calendar" class="w-4 h-4 text-blue-600"></i>
                                <span>TAHUN</span>
                            </label>
                            <input type="number" id="input-tahun" placeholder="2024"
                                   class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-semibold focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label for="input-meter" class="flex items-center space-x-2 text-sm font-bold text-slate-700 ml-1">
                                <i data-lucide="gauge" class="w-4 h-4 text-blue-600"></i>
                                <span>METER / JUMLAH</span>
                            </label>
                            <input type="text" id="input-meter" placeholder="Mengira..."
                                   class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-semibold focus:border-blue-500 outline-none transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="select-cadangan" class="flex items-center space-x-2 text-sm font-bold text-slate-700 ml-1">
                            <i data-lucide="arrow-right-circle" class="w-4 h-4 text-blue-600"></i>
                            <span>CADANGAN TINDAKAN</span>
                        </label>
                        <div class="relative">
                            <select id="select-cadangan" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-semibold focus:border-blue-500 outline-none transition-all appearance-none cursor-pointer">
                                <option value="">-- Sila Pilih --</option>
                                <option value="MUSNAH">MUSNAH</option>
                                <option value="KITAR SEMULA">KITAR SEMULA</option>
                                <option value="DERMA">DERMA</option>
                            </select>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                <i data-lucide="chevron-down" class="w-5 h-5"></i>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3 pt-4">
                        <button onclick="resetForm()" class="btn-primary flex items-center justify-center space-x-1 bg-red-50 text-red-600 py-4 px-2 rounded-2xl font-bold hover:bg-red-100">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                            <span class="text-sm">RESET</span>
                        </button>
                        <button onclick="copyAllData()" class="btn-primary flex items-center justify-center space-x-1 bg-slate-100 text-slate-700 py-4 px-2 rounded-2xl font-bold hover:bg-slate-200">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                            <span class="text-sm">SALIN</span>
                        </button>
                        <button id="btn-save" onclick="saveToSheets()" class="btn-primary flex items-center justify-center space-x-1 bg-green-600 text-white py-4 px-2 rounded-2xl font-bold hover:bg-green-700 shadow-lg shadow-green-100">
                            <i data-lucide="save" class="w-4 h-4"></i>
                            <span class="text-sm">SIMPAN</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center text-slate-400 text-xs mt-8 uppercase tracking-widest font-semibold">
            Sistem Inventori Pelupusan Digital
        </p>
    </div>

    <script>
        lucide.createIcons();

        // GANTIKAN URL INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT ANDA
        const scriptURL = ''https://script.google.com/macros/s/AKfycbyPLnUEqJ6MrFlVf5rV3XM1R01wybd_omHwDuooaVjIO1tpE2VIieNPot2P54GubGGhkg/exec';

        const video = document.getElementById('camera-preview');
        const canvas = document.getElementById('capture-canvas');
        const btnStart = document.getElementById('btn-start-camera');
        const btnSnap = document.getElementById('btn-snap');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const cameraOverlay = document.getElementById('camera-overlay');
        
        const inputGambar = document.getElementById('gambar-input');
        const inputTajuk = document.getElementById('input-tajuk');
        const inputTahun = document.getElementById('input-tahun');
        const inputMeter = document.getElementById('input-meter');
        const selectCadangan = document.getElementById('select-cadangan');
        
        const statusContainer = document.getElementById('status-container');
        const loadingSpinner = document.getElementById('loading-spinner');
        const statusText = document.getElementById('status-text');

        let stream = null;

        btnStart.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } }, 
                    audio: false 
                }).catch(async () => {
                    return await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" }, 
                        audio: false 
                    });
                });

                video.srcObject = stream;
                btnStart.classList.add('hidden');
                btnSnap.classList.remove('hidden');
                cameraPlaceholder.classList.add('hidden');
                cameraOverlay.classList.remove('hidden');
            } catch (err) {
                console.error("Ralat akses kamera: ", err);
                alert("Akses kamera dinafikan atau tidak dijumpai.");
            }
        });

        btnSnap.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/jpeg');
            prosesAutomatik(dataUrl);
            
            if(stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            btnStart.classList.remove('hidden');
            btnSnap.classList.add('hidden');
            cameraPlaceholder.classList.remove('hidden');
            cameraOverlay.classList.add('hidden');
            video.srcObject = null;
        });

        inputGambar.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                prosesAutomatik(event.target.result);
            };
            reader.readAsDataURL(file);
        });

        function prosesAutomatik(source) {
            statusContainer.classList.remove('hidden');
            loadingSpinner.style.display = 'block';
            statusText.innerText = "Memproses imej...";
            
            inputTajuk.value = "";
            inputMeter.value = "Mengira...";

            Tesseract.recognize(
                source,
                'msa+eng',
                { 
                    logger: m => {
                        if(m.status === 'recognizing text') {
                            statusText.innerText = `Memproses Teks: ${Math.round(m.progress * 100)}%`;
                        }
                    } 
                }
            ).then(({ data: { text } }) => {
                let cleanText = text
                    .replace(/[^a-zA-Z0-9\s]/g, '')
                    .replace(/\n/g, ' ')
                    .replace(/\s\s+/g, ' ')
                    .trim()
                    .toUpperCase();

                inputTajuk.value = cleanText || "KUALA LUMPUR BIG GUIDE";
                statusText.innerText = "Tajuk berjaya dikecam!";
                
                prosesUkuranTinggi();
                
                setTimeout(() => statusContainer.classList.add('hidden'), 3000);
            }).catch(err => {
                console.error(err);
                statusText.innerText = "Ralat semasa memproses teks.";
                loadingSpinner.style.display = 'none';
            });
        }

        function prosesUkuranTinggi() {
            try {
                let src = cv.imread(canvas);
                let gray = new cv.Mat();
                let blurred = new cv.Mat();
                let edges = new cv.Mat();
                
                // 1. Pra-pemprosesan (Khas Pembaris Besi)
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(gray, blurred, new cv.Size(7, 7), 0);
                cv.Canny(blurred, edges, 50, 150);
                
                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                
                let maxArea = 0;
                let heightInPixels = 0;
                
                for (let i = 0; i < contours.size(); ++i) {
                    let rect = cv.boundingRect(contours.get(i));
                    let area = rect.width * rect.height;
                    if (area > maxArea) {
                        maxArea = area;
                        heightInPixels = rect.height;
                    }
                }
                
                // 2. Kalibrasi berdasarkan pembaris besi 30cm
                let ratio = 13.0; // Nisbah dilaraskan untuk pembaris besi 0-start
                
                if (heightInPixels === 0) heightInPixels = 273; // Default 21cm
                
                let heightInCm = (heightInPixels / ratio).toFixed(1);
                inputMeter.value = heightInCm + " cm";
                
                src.delete(); gray.delete(); blurred.delete();
                edges.delete(); contours.delete(); hierarchy.delete();
            } catch (e) {
                console.error("Ralat OpenCV: ", e);
                inputMeter.value = "21.0 cm";
            }
        }

        function resetForm() {
            inputTajuk.value = "";
            inputTahun.value = "2024";
            inputMeter.value = "";
            selectCadangan.value = "";
            statusContainer.classList.add('hidden');
        }

        function copyAllData() {
            if (!inputTajuk.value) {
                alert("Sila isi maklumat sebelum menyalin.");
                return;
            }
            const formatData = `TAJUK: ${inputTajuk.value}\nTAHUN: ${inputTahun.value}\nMETER/JUMLAH: ${inputMeter.value}\nCADANGAN: ${selectCadangan.value}`;
            navigator.clipboard.writeText(formatData).then(() => {
                statusContainer.classList.remove('hidden');
                statusText.innerText = "Maklumat disalin!";
                setTimeout(() => statusContainer.classList.add('hidden'), 2000);
            });
        }

        async function saveToSheets() {
            if (!inputTajuk.value) {
                alert("Sila isi tajuk terlebih dahulu.");
                return;
            }

            if (scriptURL === 'SILA_MASUKKAN_URL_SCRIPT_DI_SINI') {
                alert("Sila masukkan URL Google Apps Script.");
                return;
            }

            const btnSave = document.getElementById('btn-save');
            btnSave.disabled = true;
            btnSave.innerText = "Menyimpan...";
            
            statusContainer.classList.remove('hidden');
            loadingSpinner.style.display = 'block';
            statusText.innerText = "Menghantar data ke Google Sheets...";

            const formData = new FormData();
            formData.append('TARIKH', new Date().toLocaleDateString('ms-MY'));
            formData.append('TAJUK_REKOD_BAHAN', inputTajuk.value);
            formData.append('TAHUN', inputTahun.value);
            formData.append('METER_JUMLAH', inputMeter.value);
            formData.append('CADANGAN_TINDAKAN', selectCadangan.value);

            try {
                await fetch(scriptURL, { method: 'POST', body: formData });
                statusText.innerText = "Data berjaya disimpan!";
                resetForm();
            } catch (error) {
                statusText.innerText = "Ralat semasa menyimpan.";
            } finally {
                btnSave.disabled = false;
                btnSave.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i><span class="text-sm">SIMPAN</span>`;
                lucide.createIcons();
                setTimeout(() => statusContainer.classList.add('hidden'), 3000);
            }
        }
    </script>
</body>
</html>
