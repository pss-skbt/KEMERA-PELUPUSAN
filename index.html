<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamera Pelupusan Pintar</title>
    
    <link rel="apple-touch-icon" sizes="120x120" href="icon120.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icon167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon180.png">
    <link rel="icon" type="image/png" sizes="180x180" href="icon180.png">

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-primary {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
        }
        
        .btn-primary:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input, select, button, textarea {
            font-size: 16px !important;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .animate-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div id="main-view" class="w-full max-w-2xl mx-auto py-6 md:py-10 px-4">
        <div class="text-center mb-6 md:mb-8">
            <div class="inline-flex items-center justify-center p-3 bg-blue-600 rounded-2xl shadow-lg mb-4 text-white">
                <i data-lucide="camera" class="w-7 h-7 md:w-8 md:h-8"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight px-2 uppercase">KAMERA PELUPUSAN PINTAR</h1>
            <p class="text-slate-500 mt-2 font-medium text-sm md:text-base">Sistem Pengurusan Rekod & Pelupusan</p>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 overflow-hidden border border-slate-100 glass-effect">
            <div class="relative bg-slate-900 aspect-[4/3] flex items-center justify-center overflow-hidden">
                <video id="camera-preview" autoplay playsinline class="w-full h-full object-cover"></video>
                <canvas id="capture-canvas" class="hidden"></canvas>
                <div id="camera-overlay" class="absolute inset-0 border-2 border-dashed border-white/20 m-6 md:m-12 pointer-events-none rounded-2xl hidden"></div>
                <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                    <div class="bg-slate-800/50 p-5 rounded-full mb-4">
                        <i data-lucide="image" class="w-10 h-10 opacity-40"></i>
                    </div>
                    <p class="text-sm font-medium text-slate-500">Sedia Untuk Imbasan</p>
                </div>
            </div>

            <div class="p-5 md:p-8">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-8">
                    <button id="btn-start-camera" class="btn-primary flex items-center justify-center space-x-2 bg-slate-900 text-white py-4 px-6 rounded-2xl font-bold hover:bg-slate-800 shadow-lg w-full">
                        <i data-lucide="video" class="w-5 h-5"></i>
                        <span>Buka Kamera</span>
                    </button>
                    <button id="btn-snap" class="btn-primary flex items-center justify-center space-x-2 bg-blue-600 text-white py-4 px-6 rounded-2xl font-bold hover:bg-blue-700 shadow-xl hidden w-full">
                        <i data-lucide="aperture" class="w-5 h-5"></i>
                        <span>Ambil Gambar</span>
                    </button>
                    <label for="gambar-input" class="btn-primary cursor-pointer flex items-center justify-center space-x-2 bg-slate-100 text-slate-700 py-4 px-6 rounded-2xl font-bold hover:bg-slate-200 w-full">
                        <i data-lucide="upload" class="w-5 h-5"></i>
                        <span>Muat Naik Fail</span>
                    </label>
                    <input type="file" id="gambar-input" accept="image/*" class="hidden">
                </div>

                <div id="status-container" class="mb-8 p-4 bg-blue-50 border border-blue-100 rounded-2xl flex items-center justify-between hidden animate-pulse">
                    <div class="flex items-center space-x-3">
                        <div class="loader"></div>
                        <span id="status-text" class="text-sm font-bold text-blue-700 uppercase tracking-wide">Memproses...</span>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="group">
                        <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 ml-1 uppercase tracking-widest">
                            <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i>
                            <span>TAJUK REKOD / BAHAN</span>
                        </label>
                        <input type="text" id="input-tajuk" placeholder="..." class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-bold outline-none focus:border-blue-500 transition-all uppercase text-lg">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="group">
                            <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 ml-1 uppercase tracking-widest">
                                <i data-lucide="calendar" class="w-4 h-4 text-blue-600"></i>
                                <span>TAHUN</span>
                            </label>
                            <input type="number" id="input-tahun" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-bold focus:border-blue-500 outline-none transition-all text-lg">
                        </div>
                        <div class="group">
                            <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 ml-1 uppercase tracking-widest">
                                <i data-lucide="gauge" class="w-4 h-4 text-blue-600"></i>
                                <span>METER / JUMLAH</span>
                            </label>
                            <input type="text" id="input-meter" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-bold focus:border-blue-500 outline-none transition-all text-lg">
                        </div>
                    </div>

                    <div class="group">
                        <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 ml-1 uppercase tracking-widest">
                            <i data-lucide="check-circle" class="w-4 h-4 text-blue-600"></i>
                            <span>CADANGAN TINDAKAN</span>
                        </label>
                        <select id="select-cadangan" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-bold focus:border-blue-500 outline-none transition-all text-lg">
                            <option value="">Sila Pilih</option>
                            <option value="MUSNAH">MUSNAH</option>
                            <option value="KITAR SEMULA">KITAR SEMULA</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pt-4">
                        <button onclick="resetForm()" class="btn-primary flex items-center justify-center space-x-2 bg-rose-50 text-rose-600 py-5 px-4 rounded-2xl font-black uppercase tracking-tight">
                            <i data-lucide="refresh-ccw" class="w-5 h-5"></i>
                            <span>Mula Semula</span>
                        </button>
                        <button onclick="copyAllData()" class="btn-primary flex items-center justify-center space-x-2 bg-slate-100 text-slate-700 py-5 px-4 rounded-2xl font-black uppercase tracking-tight">
                            <i data-lucide="clipboard" class="w-5 h-5"></i>
                            <span>Salin Teks</span>
                        </button>
                    </div>

                    <button id="btn-save" onclick="saveToSheets()" class="btn-primary flex items-center justify-center space-x-2 bg-emerald-600 text-white py-5 px-4 rounded-2xl font-black hover:bg-emerald-700 w-full shadow-lg shadow-emerald-100">
                        <i data-lucide="send" class="w-5 h-5"></i>
                        <span>Simpan Rekod</span>
                    </button>

                    <button onclick="previewDataRekod()" class="btn-primary flex items-center justify-center space-x-2 bg-amber-500 text-white py-5 px-4 rounded-2xl font-black hover:bg-amber-600 w-full shadow-lg shadow-amber-100 uppercase tracking-tight">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                        <span>PREVIEW DATA</span>
                    </button>

                    <button onclick="openArkib2()" class="btn-primary flex items-center justify-center space-x-2 bg-indigo-600 text-white py-5 px-4 rounded-2xl font-black hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all uppercase tracking-tight w-full">
                        <i data-lucide="archive" class="w-5 h-5"></i>
                        <span>ARKIB 2</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="arkib2-view" class="hidden w-full max-w-2xl mx-auto py-6 md:py-10 px-4 animate-in">
        <button onclick="closeArkib2()" class="mb-6 flex items-center text-slate-500 font-bold hover:text-slate-800 transition-colors">
            <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i>
            KEMBALI KE UTAMA
        </button>

        <div class="text-center mb-8">
            <h1 class="text-xl md:text-2xl font-extrabold tracking-tight uppercase">BORANG PERMOHONAN BAGI PEMUSNAHAN REKOD AWAM</h1>
            <p class="text-slate-500 mt-2 font-medium text-xs uppercase tracking-widest">Maklumat Mengenai Rekod (ARKIB 2)</p>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 overflow-hidden border border-slate-100">
            <div id="arkib-camera-container" class="bg-slate-900 relative aspect-[4/3] flex items-center justify-center">
                 <video id="arkib-video" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                 <div id="arkib-camera-placeholder" class="text-slate-600 flex flex-col items-center p-10 text-center">
                    <div class="bg-slate-800 p-6 rounded-full mb-4">
                        <i data-lucide="camera" class="w-12 h-12 opacity-50"></i>
                    </div>
                    <p class="text-sm font-bold uppercase tracking-widest">Kamera Sedia Untuk Dokumen</p>
                 </div>
                 <button id="btn-arkib-snap" class="absolute bottom-6 right-6 bg-blue-600 text-white p-6 rounded-full shadow-2xl hidden btn-primary">
                    <i data-lucide="aperture" class="w-8 h-8"></i>
                 </button>
            </div>

            <div class="p-6 md:p-8 space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                    <button id="btn-arkib-camera-trigger" class="btn-primary w-full flex items-center justify-center space-x-2 bg-slate-900 text-white py-5 rounded-2xl font-black">
                        <i data-lucide="camera" class="w-5 h-5"></i>
                        <span>BUKA KAMERA ARKIB</span>
                    </button>
                    <label for="arkib-gambar-input" class="btn-primary cursor-pointer flex items-center justify-center space-x-2 bg-slate-100 text-slate-700 py-5 px-6 rounded-2xl font-black hover:bg-slate-200 w-full uppercase">
                        <i data-lucide="upload" class="w-5 h-5"></i>
                        <span>Muat Naik Fail</span>
                    </label>
                    <input type="file" id="arkib-gambar-input" accept="image/*" class="hidden">
                </div>

                <div class="grid grid-cols-1 gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-[0.2em]">BILANGAN (5)</label>
                        <input type="number" id="arkib-bil" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-[0.2em]">TAJUK SIRI (6)</label>
                        <textarea id="arkib-tajuk-siri" rows="3" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 uppercase" placeholder="Masukkan tajuk siri rekod..."></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-[0.2em]">TAHUN DARI (7)</label>
                            <input type="number" id="arkib-tahun-dari" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-[0.2em]">TAHUN HINGGA (7)</label>
                            <input type="number" id="arkib-tahun-ke" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-[0.2em]">TEMPOH PENGEKALAN (8)</label>
                        <input type="text" id="arkib-tempoh" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 uppercase">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-[0.2em]">UNIT REKOD (9)</label>
                            <input type="text" id="arkib-unit" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 uppercase">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-[0.2em]">METER PANJANG (10)</label>
                            <input type="text" id="arkib-meter" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 uppercase">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="resetArkibForm()" class="btn-primary flex items-center justify-center space-x-2 bg-rose-50 text-rose-600 py-5 px-4 rounded-2xl font-black uppercase tracking-tight">
                        <i data-lucide="refresh-ccw" class="w-5 h-5"></i>
                        <span>Mula Semula</span>
                    </button>
                    <button onclick="copyArkibData()" class="btn-primary flex items-center justify-center space-x-2 bg-slate-100 text-slate-700 py-5 px-4 rounded-2xl font-black uppercase tracking-tight">
                        <i data-lucide="clipboard" class="w-5 h-5"></i>
                        <span>Salin Teks</span>
                    </button>
                </div>

                <button onclick="saveArkib2()" class="btn-primary w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition-all uppercase">
                    SIMPAN REKOD ARKIB 2
                </button>

                <button onclick="previewDataArkib()" class="btn-primary flex items-center justify-center space-x-2 bg-amber-500 text-white py-5 px-4 rounded-2xl font-black hover:bg-amber-600 w-full shadow-lg shadow-amber-100 uppercase tracking-tight">
                    <i data-lucide="eye" class="w-5 h-5"></i>
                    <span>Preview Data DI ARKIB 2</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- KONFIGURASI URL WEB APPS & SHEETS ---
        // Satu URL Web App sahaja (kerana doPost menguruskan kedua-dua action)
        const URL_WEB_APP = 'https://script.google.com/macros/s/AKfycbxyMBLbI915YnK6_Q3sU5zzCTbgdaMx8sDYzhTnEP5a0wDlLOcdL24EYBK1967A1Yxrvw/exec';
        
        const URL_SHEETS_REKOD = 'https://docs.google.com/spreadsheets/d/1_CX7jDm7xl-YGGpyZpZnfPfYBKoU_-TRJtDaFOg4fsI/edit?usp=sharing';
        const URL_SHEETS_ARKIB = 'https://docs.google.com/spreadsheets/d/1sdLxpfb1ZOo7STPwu-yTzx4wozmMFgONUb2XqkuYvBI/edit?usp=sharing';

        // Elements
        const mainView = document.getElementById('main-view');
        const arkib2View = document.getElementById('arkib2-view');
        const video = document.getElementById('camera-preview');
        const canvas = document.getElementById('capture-canvas');
        const btnStart = document.getElementById('btn-start-camera');
        const btnSnap = document.getElementById('btn-snap');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const cameraOverlay = document.getElementById('camera-overlay');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const fileInputMain = document.getElementById('gambar-input');
        const arkibVideo = document.getElementById('arkib-video');
        const btnArkibCameraTrigger = document.getElementById('btn-arkib-camera-trigger');
        const btnArkibSnap = document.getElementById('btn-arkib-snap');
        const arkibPlaceholder = document.getElementById('arkib-camera-placeholder');
        const fileInputArkib = document.getElementById('arkib-gambar-input');

        let stream = null;
        let arkibStream = null;

        // Functions Preview
        function previewDataRekod() { window.open(URL_SHEETS_REKOD, '_blank'); }
        function previewDataArkib() { window.open(URL_SHEETS_ARKIB, '_blank'); }

        // --- LOGIK SIMPAN DATA ---

        async function saveToSheets() {
            const tajuk = document.getElementById('input-tajuk').value;
            const tahun = document.getElementById('input-tahun').value;
            const meter = document.getElementById('input-meter').value;
            const cadangan = document.getElementById('select-cadangan').value;

            if(!tajuk) { alert("Tajuk tidak boleh kosong."); return; }

            statusContainer.classList.remove('hidden');
            statusText.innerText = "Menyimpan ke Rekod...";

            const params = new URLSearchParams({
                action: 'saveRekod',
                tajuk: tajuk,
                tahun: tahun,
                meter: meter,
                cadangan: cadangan
            });

            fetch(URL_WEB_APP, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            })
            .then(() => {
                alert("Rekod Utama Berjaya Disimpan!");
                statusContainer.classList.add('hidden');
                resetForm();
            })
            .catch(err => {
                console.error(err);
                alert("Ralat penghantaran Rekod.");
                statusContainer.classList.add('hidden');
            });
        }

        function saveArkib2() {
            const bil = document.getElementById('arkib-bil').value;
            const tajuk = document.getElementById('arkib-tajuk-siri').value;
            const dari = document.getElementById('arkib-tahun-dari').value;
            const hingga = document.getElementById('arkib-tahun-ke').value;
            const tempoh = document.getElementById('arkib-tempoh').value;
            const unit = document.getElementById('arkib-unit').value;
            const meter = document.getElementById('arkib-meter').value;

            if(!tajuk) { alert("Sila masukkan Tajuk Siri."); return; }

            statusContainer.classList.remove('hidden');
            statusText.innerText = "Menyimpan ke Arkib 2...";

            const params = new URLSearchParams({
                action: 'saveArkib2',
                bil: bil,
                tajuk: tajuk,
                tahun_dari: dari,
                tahun_hingga: hingga,
                tempoh: tempoh,
                unit: unit,
                meter: meter
            });

            fetch(URL_WEB_APP, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            })
            .then(() => {
                alert("Data Arkib 2 Berjaya Disimpan!");
                statusContainer.classList.add('hidden');
                resetArkibForm();
                closeArkib2();
            })
            .catch(err => {
                console.error(err);
                alert("Ralat penghantaran Arkib 2.");
                statusContainer.classList.add('hidden');
            });
        }

        // --- KAMERA & OCR ---
        btnStart.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                btnStart.classList.add('hidden');
                btnSnap.classList.remove('hidden');
                cameraPlaceholder.classList.add('hidden');
            } catch (err) { alert("Kamera tidak dapat diakses."); }
        });

        btnSnap.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            prosesOCR(canvas.toDataURL('image/jpeg'));
            if(stream) stream.getTracks().forEach(t => t.stop());
            video.srcObject = null;
            btnStart.classList.remove('hidden');
            btnSnap.classList.add('hidden');
            cameraPlaceholder.classList.remove('hidden');
        });

        function prosesOCR(source) {
            statusContainer.classList.remove('hidden');
            statusText.innerText = "Mengecam teks...";
            Tesseract.recognize(source, 'msa+eng').then(({ data: { text } }) => {
                const cleanedText = text.replace(/\n/g, ' ').toUpperCase().trim();
                document.getElementById('input-tajuk').value = cleanedText.substring(0, 150);
                statusText.innerText = "Selesai!";
                setTimeout(() => statusContainer.classList.add('hidden'), 2000);
            });
        }

        // --- NAVIGATION & RESET ---
        function resetForm() {
            document.getElementById('input-tajuk').value = "";
            document.getElementById('input-tahun').value = "";
            document.getElementById('input-meter').value = "";
            document.getElementById('select-cadangan').value = "";
        }

        function resetArkibForm() {
            document.getElementById('arkib-bil').value = "";
            document.getElementById('arkib-tajuk-siri').value = "";
            document.getElementById('arkib-tahun-dari').value = "";
            document.getElementById('arkib-tahun-ke').value = "";
            document.getElementById('arkib-tempoh').value = "";
            document.getElementById('arkib-unit').value = "";
            document.getElementById('arkib-meter').value = "";
        }

        function openArkib2() { mainView.classList.add('hidden'); arkib2View.classList.remove('hidden'); }
        function closeArkib2() { arkib2View.classList.add('hidden'); mainView.classList.remove('hidden'); }

        function copyAllData() {
            const t = document.getElementById('input-tajuk').value;
            const y = document.getElementById('input-tahun').value;
            const m = document.getElementById('input-meter').value;
            const c = document.getElementById('select-cadangan').value;
            navigator.clipboard.writeText(`TAJUK: ${t}\nTAHUN: ${y}\nMETER: ${m}\nCADANGAN: ${c}`);
            alert("Teks Utama Disalin!");
        }

        function copyArkibData() {
            const data = `BIL: ${document.getElementById('arkib-bil').value}\n` +
                         `TAJUK SIRI: ${document.getElementById('arkib-tajuk-siri').value}\n` +
                         `TAHUN: ${document.getElementById('arkib-tahun-dari').value}-${document.getElementById('arkib-tahun-ke').value}\n` +
                         `TEMPOH: ${document.getElementById('arkib-tempoh').value}\n` +
                         `UNIT: ${document.getElementById('arkib-unit').value}\n` +
                         `METER: ${document.getElementById('arkib-meter').value}`;
            navigator.clipboard.writeText(data);
            alert("Data Arkib 2 Disalin!");
        }

        btnArkibCameraTrigger.addEventListener('click', async () => {
            try {
                arkibStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                arkibVideo.srcObject = arkibStream;
                arkibVideo.classList.remove('hidden');
                btnArkibSnap.classList.remove('hidden');
                arkibPlaceholder.classList.add('hidden');
            } catch (err) { alert("Gagal buka kamera arkib."); }
        });

        btnArkibSnap.addEventListener('click', () => {
            canvas.width = arkibVideo.videoWidth;
            canvas.height = arkibVideo.videoHeight;
            canvas.getContext('2d').drawImage(arkibVideo, 0, 0);
            if(arkibStream) arkibStream.getTracks().forEach(t => t.stop());
            arkibVideo.classList.add('hidden');
            btnArkibSnap.classList.add('hidden');
            arkibPlaceholder.classList.remove('hidden');
        });
    </script>
</body>
</html>
